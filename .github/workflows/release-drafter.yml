name: Release Drafter

on:
    push:
        branches:
            - main

permissions:
  contents: read

jobs:
    draft:
        permissions:
            contents: write
            pull-requests: read
        runs-on: ubuntu-latest
        steps:
            - name: Release Drafter
              if: github.repository == 'Kartaviy95/MKK-Proving-Ground'
              uses: release-drafter/release-drafter@v6
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
